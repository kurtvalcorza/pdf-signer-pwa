<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1c1e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!--
      Strict CSP (research R9): connect-src 'none' makes outbound data exfiltration
      structurally impossible. If the Workbox precache spike (T019) shows precache
      requires it, connect-src falls back to 'self' — documented honestly.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'none'; img-src 'self' data: blob:; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>PDF Signer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
