# US4 — build, gate, and publish the portable desktop artifacts (Windows portable + Linux AppImage)
# from ONE commit, with checksums + build-provenance attestation. Leaves ci.yml untouched (SC-008).
#
# The release gate is authoritative in contracts/release-artifacts.md § Release gate; this workflow
# implements it. Any platform's gate red -> nothing publishes (SC-002): fail-fast matrix + the publish
# job `needs:` every build leg, so a partial release is structurally impossible.
name: release-desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the release
  id-token: write # provenance attestation (Sigstore OIDC)
  attestations: write # provenance attestation record

jobs:
  build:
    strategy:
      fail-fast: true # a red platform must stop the whole release
      matrix:
        include:
          - os: windows-latest
            unpacked: 'release/win-unpacked/PDF Signer.exe'
            artifact: 'release/*.exe'
          - os: ubuntu-latest
            unpacked: 'release/linux-unpacked/pdf-signer-pwa'
            artifact: 'release/*.AppImage'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyhanko
      - run: npm ci
      - name: Lint (blocks the release on a layer-3 network-import violation)
        run: npm run lint
      - name: Install Linux headless deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Build desktop artifact (portable .exe / AppImage) from this commit
        run: npm run build:desktop
      - name: Web gates untouched (SC-008/FR-019)
        run: npm test && npm run verify:signatures

      # --- Per-distribution gate (Principle V — earns its own pass) ---
      - name: Desktop E2E (sign -> pyHanko, portable state, layer 2, US3 surfaces) [Windows]
        if: runner.os == 'Windows'
        run: npx playwright test --config playwright.desktop.config.ts
      - name: Desktop E2E [Linux, xvfb]
        if: runner.os == 'Linux'
        run: xvfb-run -a npx playwright test --config playwright.desktop.config.ts
      - name: Packaged artifact signs a pyHanko-valid PDF [Windows]
        if: runner.os == 'Windows'
        run: node electron/verify-packaged.mjs
      # Gate the ACTUAL AppImage, not linux-unpacked: extract it (the extract-and-run fallback path,
      # FR-002a) and drive the extracted binary, so a broken wrapper / APPIMAGE data-location regression
      # is caught before publish.
      - name: Packaged AppImage signs a pyHanko-valid PDF [Linux, extract-and-run, xvfb]
        if: runner.os == 'Linux'
        run: |
          set -e
          APPIMAGE_PATH=$(ls release/*.AppImage | head -1)
          ( cd release && chmod +x *.AppImage && ./*.AppImage --appimage-extract >/dev/null )
          # PKG_APPIMAGE drives the real Linux APPIMAGE data-location branch (dirname(APPIMAGE)), not
          # the Windows PORTABLE_EXECUTABLE_DIR path — so an AppImage-specific persistence regression
          # is exercised.
          PKG_EXE=release/squashfs-root/pdf-signer-pwa PKG_APPIMAGE="$APPIMAGE_PATH" \
            xvfb-run -a node electron/verify-packaged.mjs
      # SC-004 no-egress gate (network-namespace method, contracts/release-artifacts.md § Verification):
      # run the packaged app with a monitored dummy default route and NO real network, capturing on the
      # namespace's interface. Fail on ANY captured packet over the whole app process tree.
      #
      # ⚠ KNOWN GAP (explicit, not implicit): this runs on LINUX only. An equivalent Windows egress gate
      # (WFP/pktmon) is a follow-up — the Windows leg's no-egress guarantee currently rests on the
      # layer-3 import lint + the offline behaviour, not a packet-level capture. Tracked in issue #12.
      - name: No-egress gate — packet capture over the app process tree (SC-004) [Linux]
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo ip netns add appns
          sudo ip netns exec appns ip link set lo up
          # a routable-but-black-hole default so egress ATTEMPTS are emitted (and captured), not merely
          # refused for lack of a route (which would record nothing — the offline-run trap).
          sudo ip netns exec appns ip link add dummy0 type dummy
          sudo ip netns exec appns ip addr add 10.99.0.1/24 dev dummy0
          sudo ip netns exec appns ip link set dummy0 up
          sudo ip netns exec appns ip route add default dev dummy0
          # -U = write each packet immediately (unbuffered); without it libpcap can hold captured
          # packets in its stdio buffer past our read window and report a false COUNT=0.
          sudo ip netns exec appns tcpdump -i any -n -U -w /tmp/egress.pcap 'not (host 127.0.0.1 or host ::1)' &
          sleep 2
          # Same APPIMAGE data-location branch as the signing gate above, for consistency.
          APPIMAGE_PATH=$(ls release/*.AppImage | head -1)
          sudo ip netns exec appns su "$USER" -c \
            "PKG_EXE=release/squashfs-root/pdf-signer-pwa PKG_APPIMAGE='$APPIMAGE_PATH' ELECTRON_DISABLE_SANDBOX=1 xvfb-run -a node electron/verify-packaged.mjs"
          sleep 2
          # Stop the capture cleanly (SIGINT makes tcpdump flush + exit) BEFORE reading the pcap.
          sudo pkill -INT -f 'tcpdump.*egress.pcap' || true
          sleep 1
          COUNT=$(sudo tcpdump -r /tmp/egress.pcap 2>/dev/null | wc -l || echo 0)
          echo "captured $COUNT non-loopback packets from the app process tree"
          test "$COUNT" -eq 0

      # --- Checksums + provenance for the shipped artifact ---
      # PER-PLATFORM name so the two matrix legs don't both upload a file literally named SHA256SUMS
      # (GitHub release assets must be uniquely named — a collision would fail publish AFTER one leg's
      # assets are attached = a partial release). The publish job MERGES these into one SHA256SUMS.
      - name: Per-platform checksum
        shell: bash
        run: |
          cd release
          FILE=$(ls *.exe *.AppImage 2>/dev/null | head -1)
          sha256sum "$FILE" > "SHA256SUMS-${{ runner.os }}"
      - name: Provenance attestation (FR-018a — record in GitHub attestations API, not a release asset)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            ${{ matrix.artifact }}
            release/SHA256SUMS-${{ runner.os }}
          if-no-files-found: error

  publish:
    needs: build # only runs if BOTH build legs succeeded — no partial release (SC-002)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      # T032a — gate the required USER-FACING disclosures before publishing. The unsigned-binary
      # warning promises a verification path and the FUSE-less fallback is the only no-root Linux path,
      # so publishing without them is an overclaim. (Assets are gated by upload-artifact if-no-files.)
      - name: Gate release disclosures present (FR-014/015/018a/002a)
        run: |
          set -e
          D=docs/desktop.md
          for needle in "SmartScreen" "does not update itself" "gh attestation verify" "appimage-extract-and-run" "no user content remains"; do
            grep -qiF "$needle" "$D" || { echo "MISSING disclosure in $D: $needle"; exit 1; }
          done
          echo "All required disclosures present."
      # Merge the per-platform checksums into ONE SHA256SUMS (what docs/desktop.md tells users to
      # `sha256sum -c`), and stage the artifacts under unique names for the release.
      - name: Assemble release files
        run: |
          set -e
          mkdir -p out
          cat dist-artifacts/**/SHA256SUMS-* > out/SHA256SUMS
          find dist-artifacts -type f \( -name '*.exe' -o -name '*.AppImage' \) -exec cp {} out/ \;
          echo "--- SHA256SUMS ---"; cat out/SHA256SUMS
      - name: Publish release with artifacts + checksums
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          body_path: docs/desktop.md
          fail_on_unmatched_files: true
